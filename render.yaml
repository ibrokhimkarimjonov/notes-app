services:
  - type: web
    name: collab-notes-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: web
    name: collab-notes-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE
        value: https://collab-notes-api.onrender.com
      - key: VITE_WS_BASE
        value: wss://collab-notes-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
